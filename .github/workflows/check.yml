name: Check Seats

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: '確認日 (YYYY-MM-DD)'
        required: true
        type: string

      mode:
        description: 'once or interval'
        required: true
        default: 'once'
        type: choice
        options:
          - once
          - interval

  schedule:
    - cron: '*/30 * * * *'

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Install Playwright
        run: playwright install chromium

      - name: Set env from workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "TARGET_DATE=${{ github.event.inputs.target_date }}" >> $GITHUB_ENV
          echo "RUN_MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
          echo "FIRST_RUN=true" >> $GITHUB_ENV

      - name: Set env from repository variables
        if: github.event_name == 'schedule'
        run: |
          echo "TARGET_DATE=${{ vars.TARGET_DATE }}" >> $GITHUB_ENV
          echo "RUN_MODE=interval" >> $GITHUB_ENV
          echo "FIRST_RUN=false" >> $GITHUB_ENV

      - name: Skip when not running
        if: github.event_name == 'schedule' && vars.RUNNING != 'true'
        run: |
          echo "監視停止中"
          exit 0

      - name: Run Seat Checker
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SMOOZ_ID: ${{ secrets.SMOOZ_ID }}
          SMOOZ_PASSWORD: ${{ secrets.SMOOZ_PASSWORD }}
          TARGET_DATE: ${{ env.TARGET_DATE }}
          RUN_MODE: ${{ env.RUN_MODE }}
          FIRST_RUN: ${{ env.FIRST_RUN }}
        run: python app/main.py